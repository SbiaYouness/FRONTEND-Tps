<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexHotel | Sign up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page signup-page">
    <header class="site-header">
        <nav class="nav">
            <a href="index.html" class="logo" aria-label="Accueil FlexHotel">
                <img src="assets/images/logo.png" alt="FlexHotel">
            </a>

            <ul class="menu auth-menu">
                <li><a href="index.html">Espace Client</a></li>
                <li><a href="signup.html" class="active">Sign up</a></li>
                <li><a href="signin.html">Sign in</a></li>
            </ul>
        </nav>
    </header>

    <main class="container auth-layout">
        <section class="auth-intro">
            <h1>Join in and reserve your first hotel room</h1>
            <p>Create your account in a few steps and start planning your next stay.</p>
            <img src="assets/images/image4.jpg" alt="Scene de reservation d'hotel">
        </section>

        <section class="auth-forms auth-forms-single">
            <article class="auth-card">
                <h2>Sign up</h2>
                <form action="#" method="post">
                    <label for="signup-firstname">Prenom</label>
                    <input id="signup-firstname" type="text" name="firstname" required>

                    <label for="signup-lastname">Nom</label>
                    <input id="signup-lastname" type="text" name="lastname" required>

                    <label for="signup-email">Email</label>
                    <input id="signup-email" type="email" name="email" required>

                    <label for="signup-password">Mot de passe</label>
                    <input id="signup-password" type="password" name="password" minlength="6" required>

                    <button type="submit">Creer mon compte</button>
                </form>

                <p class="switch-auth">
                    Vous avez deja un compte ?
                    <a href="signin.html">Sign in</a>
                </p>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 FlexHotel - Creation de compte</p>
    </footer>
</body>
</html>
