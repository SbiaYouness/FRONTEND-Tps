<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexHotel | Sign in</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page signin-page">
    <header class="site-header">
        <nav class="nav">
            <a href="index.html" class="logo" aria-label="Accueil FlexHotel">
                <img src="assets/images/logo.png" alt="FlexHotel">
            </a>

            <ul class="menu auth-menu">
                <li><a href="index.html">Espace Client</a></li>
                <li><a href="signup.html">Sign up</a></li>
                <li><a href="signin.html" class="active">Sign in</a></li>
            </ul>
        </nav>
    </header>

    <main class="container auth-layout">
        <section class="auth-intro">
            <h1>Welcome back</h1>
            <p>What's the destination this time?</p>
            <img src="assets/images/image5.jpg" alt="Client reservant un hotel">
        </section>

        <section class="auth-forms auth-forms-single">
            <article class="auth-card">
                <h2>Sign in</h2>
                <form action="#" method="post">
                    <label for="signin-email">Email</label>
                    <input id="signin-email" type="email" name="email" placeholder="votre@email.com" required>

                    <label for="signin-password">Mot de passe</label>
                    <input id="signin-password" type="password" name="password" placeholder="********" required>

                    <button type="submit">Se connecter</button>
                </form>

                <p class="switch-auth">
                    Nouveau sur FlexHotel ?
                    <a href="signup.html">Sign up</a>
                </p>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 FlexHotel - Connexion</p>
    </footer>
</body>
</html>
