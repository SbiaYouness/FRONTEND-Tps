<!DOCTYPE html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<style>
	* {
	  box-sizing: border-box;
	}

	/* Style the top navigation bar */
	.topnav {
	  overflow: hidden;
	  background-color: #333;
	}

	/* Style the topnav links */
	.topnav a {
	  float: left;
	  display: block;
	  color: #f2f2f2;
	  text-align: center;
	  padding: 14px 16px;
	  text-decoration: none;
	}

	/* Change color on hover */
	.topnav a:hover {
	  background-color: #ddd;
	  color: black;
	}

	/* On screens that are 600px wide or less, make the menu links stack on top of each other instead of next to each other */
	@media screen and (max-width: 600px) {
	  .topnav a {
		float: none;
		width: 100%;
	  }
	}
</style>
</head>
<body>
<div id="ld" style="background:pink;color:#333;position:fixed;left:0;top:0;z-index:99999999;font:1em arial;opacity:.9"></div>
            <script>
                //setInterval: exécute le code toute les 150 millisecondes 
            setInterval(function()
            {
                    $('#ld').text($(document).width()+' px ** '+$(document).height()+' px');
            },150);
            </script>
<h2>Responsive navigation menu</h2>
<p>Resize the browser window to see the effect: When the screen is less than 600px, the navigation menu will be displayed vertically instead of horizontally.</p>

<div class="topnav">
  <a href="#">Link</a>
  <a href="#">Link</a>
  <a href="#">Link</a>
</div>

</body>
</html>
