<!DOCTYPE html>
<html>
<head>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<style>
	div.example {
	  background-color: yellow;
	  padding: 20px;
	}
	@media screen and (max-width: 600px) {
	  div.example {
		display: none;
	  }
	}
</style>
</head>
<body>
<div id="ld" style="background:pink;color:#333;position:fixed;left:0;top:0;z-index:99999999;font:1em arial;opacity:.9"></div>
            <script>
                //setInterval: exécute le code toute les 150 millisecondes 
            setInterval(function()
            {
                    $('#ld').text($(document).width()+' px ** '+$(document).height()+' px');
            },150);
            </script>
<h2>Hide elements on different screen sizes</h2>
<div class="example">Example DIV.</div>
<p>When the browser's width is 600px wide or less, hide the div element. Resize the browser window to see the effect.</p>
</body>
</html>
