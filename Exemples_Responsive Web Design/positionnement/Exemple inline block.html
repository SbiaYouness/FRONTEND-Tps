<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style type="text/css">
		p{
			border: 2px solid rebeccapurple;
			width: 300px;
			height: 300px;
		}
		span {
			  margin: 20px;
			  padding: 20px;
			  width: 80px;
			  height: 50px;
			  background-color: lightblue;
			  border: 2px solid blue;
			  display: inline-block; /*block*/
			}
	</style>
  </head>
  <body>
	<p>
		I am a paragraph and this is a 
			<span>span</span> 
		inside that paragraph. A span is an inline element and so does not respect width and height.
	</p>  
</body>
</html>
