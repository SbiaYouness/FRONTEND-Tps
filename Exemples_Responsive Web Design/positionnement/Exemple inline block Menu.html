<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style type="text/css">
		.links-list li /*li placé dans elt de classe "links-list" */
		{
			display : inline;
		}
		.links-list a 
		{
			  display: inline-block; 
			  background-color: rgb(179,57,81);
			  color: #fff;
			  text-decoration: none;
			  padding: 1em 2em;
		}

		.links-list a:hover 
		{
			  background-color: rgb(66, 28, 40);
			  color: #fff;
		}
	</style>
  </head>
  <body>
		<nav>
		  <ul class="links-list">
			<li><a href="">Link one</a></li>
			<li><a href="">Link two</a></li>
			<li><a href="">Link three</a></li>
		  </ul>
		</nav>    
</body>
</html>
